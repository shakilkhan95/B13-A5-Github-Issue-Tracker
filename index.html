<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker | Login</title>

    <!-- tailwindcss & daisyUI cdn link  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google font link  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- fontAwesome cdn link  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- custom css link  -->
    <link rel="stylesheet" href="./styles/style.css">

    <!-- favIcon link  -->
     <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
</head>
<body class="bg-[#F8FAFC] py-10 px-5">
    <section class="bg-base-100 py-10 px-5 max-w-sm flex flex-col justify-center items-center mx-auto shadow-md">
        <header class="text-center">
            <div class="flex justify-center mb-5"><img src="./assets/github-logo.png" alt="Github Logo"></div>
            <h2 class="text-2xl font-semibold text-[#1F2937]">GitHub Issues Tracker</h2>
            <p class="text-[#64748B]">Sign in to manage your issues</p>
        </header>

        <div class="w-full mt-5">
            <fieldset class="fieldset">
                <label class="text-[#1F2937] font-medium text-base">Username</label>
                <input id="user-name" type="text" class="input w-full" placeholder="Enter Username" />
                <p class="text-sm text-[#4A00FF]">Default: admin</p>
                <label class="text-[#1F2937] font-medium text-base">Password</label>
                <input id="password" type="password" class="input w-full" placeholder="Enter Password" />
                <p class="text-sm text-[#4A00FF]">Default: admin123</p>
                <button type="submit" id="sign-in-btn" class="btn btn-primary mt-4">Sign In</button>
            </fieldset>
        </div>
    </section>

    <script src="./scripts/login.js"></script>
</body>
</html>
