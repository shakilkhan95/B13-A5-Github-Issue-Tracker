<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker | Main</title>

    <!-- tailwindcss & daisyUI cdn link  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google font link  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- fontAwesome cdn link  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- custom css link  -->
    <link rel="stylesheet" href="./styles/style.css">

    <!-- favIcon link  -->
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
</head>

<body class="bg-[#F8FAFC]">
    <!-- header section starts here  -->
    <header class="py-6 px-20 bg-base-100 flex flex-col lg:flex-row gap-5 lg:justify-between items-center rounded-lg ">
        <div class="flex items-center gap-2">
            <div><img class="w-12" src="./assets/github-logo.png" alt="Github logo"></div>
            <h2 class="text-2xl font-semibold text-[#1F2937]">GitHub Issues Tracker</h2>
        </div>

        <div class="flex">
            <div>
                <input  class="input rounded-lg" type="text" placeholder="Search issues" required />
            </div>
            <button class="btn btn-primary rounded-lg ml-2">Search</button>
        </div>
    </header>

    <script src="./scripts/main.js"></script>
</body>

</html>
